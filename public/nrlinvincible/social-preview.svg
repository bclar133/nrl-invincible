<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NRL Invincible</title>
  <desc id="desc">A fan-made rugby league season simulator by Brent Clark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07100c" />
      <stop offset="100%" stop-color="#123d28" />
    </linearGradient>
    <pattern id="field" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 0H120M0 60H120M0 120H120M0 0V120M60 0V120M120 0V120" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#field)" />
  <rect x="70" y="70" width="1060" height="490" rx="30" fill="#07140e" stroke="#adff55" stroke-opacity="0.35" stroke-width="3" />
  <text x="120" y="205" fill="#adff55" font-family="Arial, sans-serif" font-size="86" font-weight="900">NRL Invincible</text>
  <text x="124" y="300" fill="#f4fff7" font-family="Arial, sans-serif" font-size="44" font-weight="800">Can you go through a season undefeated?</text>
  <text x="124" y="378" fill="#dce8dd" font-family="Arial, sans-serif" font-size="32" font-weight="700">Draft your XIII. Choose your style. Survive finals.</text>
  <text x="124" y="488" fill="#ffd45d" font-family="Arial, sans-serif" font-size="30" font-weight="800">A fan-made rugby league season simulator by Brent Clark</text>
</svg>
