<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brent Clark Games</title>
    <meta name="description" content="Games by Brent Clark, including NRL Invincible, a fan-made rugby league season simulator." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.brent-clark.com/" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        background: #07100c;
        color: #f4fff7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          #07100c;
        background-size: 42px 42px;
      }

      main {
        width: min(720px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 24px;
        font-size: clamp(40px, 8vw, 76px);
      }

      section {
        border: 1px solid rgba(172, 255, 85, 0.28);
        border-radius: 8px;
        padding: 24px;
        background: rgba(10, 26, 18, 0.88);
      }

      a {
        color: #adff55;
        font-weight: 800;
      }

      p {
        max-width: 58ch;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Brent Clark Games</h1>
      <section>
        <h2><a href="/nrlinvincible/">NRL Invincible</a></h2>
        <p>A fan-made rugby league season simulator. Draft a 13-player squad, choose your style, play through finals, and see if you can go through a season undefeated.</p>
      </section>
    </main>
  </body>
</html>
